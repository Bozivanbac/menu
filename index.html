<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Badminton - Menu Gọi Nước Tự Động</title>
    <!-- Chèn thư viện Firebase phiên bản dễ dùng nhất cho file HTML lẻ -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        :root {
            --bg-color: #0a0b10;
            --card-bg: rgba(20, 24, 33, 0.8);
            --neon-blue: #00f2fe;
            --neon-pink: #ff007f;
            --neon-green: #39ff14;
            --text-color: #e2e8f0;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { 
            background: var(--bg-color); 
            background-image: radial-gradient(circle at 50% 50%, #1a1b2f 0%, #0a0b10 100%);
            margin: 0; padding: 15px; color: var(--text-color); 
        }
        
        .container { max-width: 1400px; margin: auto; display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 992px) { .container { grid-template-columns: 1fr 2fr 1fr; } }
        
        /* Hiệu ứng kính mờ Cyberpunk */
        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px; border-radius: 16px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            margin-bottom: 20px; 
        }
        
        h2 { margin-top: 0; font-size: 1.2rem; color: var(--neon-blue); text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }
        
        input, select { 
            width: 100%; padding: 12px; background: rgba(0,0,0,0.5); 
            border: 1px solid rgba(0, 242, 254, 0.5); border-radius: 8px; 
            color: #fff; font-size: 15px; margin-bottom: 15px; transition: 0.3s;
        }
        input:focus, select:focus { border-color: var(--neon-pink); outline: none; box-shadow: 0 0 10px rgba(255, 0, 127, 0.5); }
        label { display: block; margin-bottom: 6px; font-size: 13px; color: #a0aec0; }
        
        /* Grid danh sách món ăn nước uống */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .product-item { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); 
            padding: 12px; border-radius: 12px; text-align: center; transition: all 0.3s; position: relative;
        }
        .product-item:hover { 
            transform: translateY(-3px); border-color: var(--neon-blue); 
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.3); 
        }
        .p-name { font-weight: bold; font-size: 14px; margin-bottom: 5px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .p-price { color: var(--neon-pink); font-weight: bold; margin-bottom: 8px; font-size: 15px; }
        
        /* Nút xóa món dành riêng cho Admin */
        .btn-delete-p {
            position: absolute; top: 5px; right: 5px; background: none; border: none; color: #718096; cursor: pointer; font-size: 14px;
        }
        .btn-delete-p:hover { color: var(--neon-pink); }

        /* Nút bấm */
        .btn { 
            background: linear-gradient(45deg, #00f2fe, #4facfe); color: #000; font-weight: bold;
            border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; transition: 0.3s; 
        }
        .btn:hover { opacity: 0.9; box-shadow: 0 0 15px var(--neon-blue); }
        .btn-admin { background: linear-gradient(45deg, #ff007f, #7928ca); color: #fff; }
        .btn-admin:hover { box-shadow: 0 0 15px var(--neon-pink); }
        .btn-checkout { background: linear-gradient(45deg, #39ff14, #00ff87); color: #000; font-size: 16px; margin-top: 10px; }
        
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed rgba(255,255,255,0.1); font-size: 14px; }
        #qr-container { text-align: center; margin-top: 15px; display: none; padding: 15px; background: #fff; border-radius: 12px; }
        #qr-image { max-width: 170px; margin-top: 10px; }
    </style>
</head>
<body>

<h1 style="text-align: center; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); font-size: 1.6rem; margin-bottom: 25px;">⚡ PHÚC AN BADMINTON MENU ⚡</h1>

<div class="container">
    
    <!-- CỘT 1: ADMIN & THÔNG TIN KHÁCH -->
    <div>
        <!-- PANEL ĐỂ ADMIN NHẬP THÊM HÀNG (Tự động đồng bộ lên Firebase) -->
        <div class="card" style="border-color: var(--neon-pink);">
            <h2>🛠️ NHẬP HÀNG MỚI (ADMIN)</h2>
            <label>Tên nước / Phụ kiện:</label>
            <input type="text" id="admin-p-name" placeholder="Ví dụ: Sting dâu, Quấn cán Yonex...">
            <label>Giá bán công khai (VNĐ):</label>
            <input type="number" id="admin-p-price" placeholder="Ví dụ: 15000">
            <button class="btn btn-admin" onclick="adminAddProduct()">➕ ĐƯA LÊN HỆ THỐNG</button>
        </div>

        <!-- THÔNG TIN KHÁCH HÀNG -->
        <div class="card">
            <h2>👤 THÔNG TIN ĐẶT MÓN</h2>
            <label>Tên khách hàng / Số điện thoại:</label>
            <input type="text" id="customer-name" placeholder="Nhập tên của bạn...">
            <label>Vị trí Sân của bạn:</label>
            <select id="court-number">
                <option value="Sân 1">Sân số 1</option>
                <option value="Sân 2">Sân số 2</option>
                <option value="Sân 3">Sân số 3</option>
                <option value="Sân 4">Sân số 4</option>
                <option value="Sân 5">Sân số 5</option>
            </select>
        </div>
    </div>

    <!-- CỘT 2: KHO HÀNG ĐỒNG BỘ REALTIME -->
    <div>
        <div class="card" style="min-height: 450px;">
            <h2>🏸 MENU NƯỚC & PHỤ KIỆN</h2>
            <div class="product-grid" id="product-list">
                <p style="color: #718096; text-align: center; grid-column: 1/-1;">Đang tải menu từ hệ thống...</p>
            </div>
        </div>
    </div>

    <!-- CỘT 3: GIỎ HÀNG & THANH TOÁN -->
    <div>
        <div class="card">
            <h2>🛒 GIỎ HÀNG CỦA BẠN</h2>
            <div id="cart-content">
                <p style="color: #718096; text-align: center; font-size: 14px;">Chưa chọn món nào.</p>
            </div>
            <h3 style="text-align: right; margin: 15px 0; color: var(--neon-pink);">Tổng tiền: <span id="total-price">0đ</span></h3>
            
            <label>Hình thức thanh toán:</label>
            <select id="payment-method" onchange="togglePayment()">
                <option value="CASH">Tiền mặt tại quầy</option>
                <option value="QR">Chuyển khoản (Hiện mã QR)</option>
            </select>

            <button class="btn btn-checkout" onclick="processCheckout()">🔔 ĐẶT HÀNG & BÁO NHÂN VIÊN</button>

            <!-- KHU VỰC HIỆN QR TỰ ĐỘNG -->
            <div id="qr-container">
                <b style="color: #000; font-size: 14px;">Quét Mã QR Qua Ngân Hàng</b>
                <div id="qr-info" style="color: #555; font-size: 12px; margin: 5px 0;"></div>
                <img id="qr-image" src="" alt="Mã QR">
            </div>
        </div>
    </div>

</div>

<script>
    // ==================== 1. CẤU HÌNH FIREBASE MỚI CỦA BẠN ====================
    const firebaseConfig = {
        apiKey: "AIzaSyCc0CLn5AWsQ6qzd9EIRvf4H_Lw6dcZRoM",
        authDomain: "menu-68f29.firebaseapp.com",
        databaseURL: "https://menu-68f29-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "menu-68f29",
        storageBucket: "menu-68f29.firebasestorage.app",
        messagingSenderId: "677638363904",
        appId: "1:677638363904:web:e2136140f2226d602371e5",
        measurementId: "G-YNHPWJK3Y9"
    };
    // Khởi tạo Firebase kết nối trực tiếp
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // ==================== 2. CẤU HÌNH BOT TELEGRAM CỦA BẠN ====================
    const TELEGRAM_CONFIG = {
        token: "ĐIỀN_TOKEN_BOT_CỦA_BẠN",      // Dán mã Token Bot của bạn vào đây
        chatId: "ĐIỀN_ID_NHÓM_CHAT_CỦA_BẠN"   // Dán ID nhóm chat của bạn vào đây (ví dụ: -100xxxxxxxxx)
    };

    // ==================== 3. CẤU HÌNH NGÂN HÀNG NHẬN TIỀN QR ====================
    const BANK_CONFIG = {
        bankId: "MB",               // Ngân hàng của bạn (MB, Vietcombank, Techcombank...)
        accountNo: "0123456789",    // Số tài khoản của bạn để khách chuyển vào
        accountName: "NGUYEN VAN A" // Tên tài khoản viết hoa không dấu
    };

    let products = [];
    let cart = [];

    // TỰ ĐỘNG TẢI VÀ ĐỒNG BỘ THỰC ĐƠN TỪ FIREBASE THEO THỜI GIAN THỰC
    database.ref('menu_products').on('value', (snapshot) => {
        const data = snapshot.val();
        products = [];
        if (data) {
            for (let id in data) {
                products.push({ id: id, ...data[id] });
            }
        } else {
            // Nếu database mới tinh chưa có gì, tự động tạo sẵn vài món mặc định mẫu
            const defaultItems = {
                "p1": { name: "Nước suối Aquafina", price: 10000 },
                "p2": { name: "Nước bù khoáng Revive", price: 15000 },
                "p3": { name: "Sting dâu đỏ", price: 15000 },
                "p4": { name: "Quấn cán vợt VS loại tốt", price: 20000 }
            };
            database.ref('menu_products').set(defaultItems);
        }
        renderProducts();
    });

    // HIỂN THỊ HÀNG HÓA RA MÀN HÌNH
    function renderProducts() {
        const grid = document.getElementById('product-list');
        grid.innerHTML = '';
        if (products.length === 0) {
            grid.innerHTML = '<p style="color: #718096; text-align: center; grid-column: 1/-1;">Chưa có món nào trong thực đơn.</p>';
            return;
        }
        products.forEach(p => {
            grid.innerHTML += `
                <div class="product-item">
                    <button class="btn-delete-p" onclick="adminDeleteProduct('${p.id}')" title="Xóa món này (Admin)">❌</button>
                    <div class="p-name">${p.name}</div>
                    <div class="p-price">${p.price.toLocaleString()}đ</div>
                    <button class="btn" onclick="addToCart('${p.id}')">Thêm vào giỏ</button>
                </div>
            `;
        });
    }

    // ADMIN: THÊM MÓN MỚI (Đẩy thẳng dữ liệu lên mạng)
    function adminAddProduct() {
        const nameInput = document.getElementById('admin-p-name');
        const priceInput = document.getElementById('admin-p-price');
        
        if (!nameInput.value || !priceInput.value) {
            alert("Admin ơi, vui lòng điền đủ tên hàng và giá tiền nhé!");
            return;
        }

        database.ref('menu_products').push({
            name: nameInput.value,
            price: parseInt(priceInput.value)
        });

        nameInput.value = '';
        priceInput.value = '';
    }

    // ADMIN: XÓA MÓN KHỎI THỰC ĐƠN
    function adminDeleteProduct(productId) {
        if (confirm("Bạn có chắc chắn muốn xóa món này khỏi thực đơn hệ thống không?")) {
            database.ref(`menu_products/${productId}`).remove();
        }
    }

    // KHÁCH: BẤM THÊM MÓN VÀO GIỎ HÀNG ĐỂ ĐẶT
    function addToCart(productId) {
        const product = products.find(p => p.id === productId);
        const itemInCart = cart.find(item => item.id === productId);

        if (itemInCart) {
            itemInCart.quantity += 1;
        } else {
            cart.push({ ...product, quantity: 1 });
        }
        renderCart();
    }

    // CẬP NHẬT GIỎ HÀNG TRÊN MÀN HÌNH ĐIỆN THOẠI
    function renderCart() {
        const content = document.getElementById('cart-content');
        const totalSpan = document.getElementById('total-price');
        
        if (cart.length === 0) {
            content.innerHTML = '<p style="color: #718096; text-align: center; font-size: 14px;">Chưa chọn món nào.</p>';
            totalSpan.innerText = '0đ';
            return;
        }

        let html = '';
        let total = 0;
        
        cart.forEach(item => {
            let itemTotal = item.price * item.quantity;
            total += itemTotal;
            html += `
                <div class="cart-item">
                    <span>${item.name} <b>x${item.quantity}</b></span>
                    <span style="color: var(--neon-blue);">${itemTotal.toLocaleString()}đ</span>
                </div>
            `;
        });

        content.innerHTML = html;
        totalSpan.innerText = total.toLocaleString() + 'đ';
        
        if(document.getElementById('payment-method').value === 'QR') {
            generateQR(total);
        }
    }

    // ẨN HIỆN MÃ QR
    function togglePayment() {
        const method = document.getElementById('payment-method').value;
        const qrContainer = document.getElementById('qr-container');
        if (method === 'QR' && cart.length > 0) {
            let total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            generateQR(total);
        } else {
            qrContainer.style.display = 'none';
        }
    }

    // TẠO MÃ QR THANH TOÁN TỰ ĐỘNG BẰNG VIETQR ĐỂ HIỆN CHO KHÁCH QUÉT LUÔN
    function generateQR(amount) {
        const court = document.getElementById('court-number').value;
        const customer = document.getElementById('customer-name').value || "Khach Le";
        const description = `Tien nuoc ${court} ${customer}`.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/đ/g, "d");
        
        const qrUrl = `https://img.vietqr.io/image/${BANK_CONFIG.bankId}-${BANK_CONFIG.accountNo}-compact.png?amount=${amount}&addInfo=${encodeURIComponent(description)}&accountName=${encodeURIComponent(BANK_CONFIG.accountName)}`;
        
        document.getElementById('qr-image').src = qrUrl;
        document.getElementById('qr-info').innerText = `STK: ${BANK_CONFIG.accountNo} - Số tiền: ${amount.toLocaleString()}đ`;
        document.getElementById('qr-container').style.display = 'block';
    }

    // BẮN THÔNG BÁO QUA API TELEGRAM ĐẾN ĐIỆN THOẠI NHÂN VIÊN
    function sendNotificationToTelegram(message) {
        const url = `https://api.telegram.org/bot${TELEGRAM_CONFIG.token}/sendMessage`;
        fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                chat_id: TELEGRAM_CONFIG.chatId,
                text: message,
                parse_mode: "HTML"
            })
        }).catch(err => console.error("Lỗi mạng gửi Telegram:", err));
    }

    // KHÁCH BẤM NÚT XÁC NHẬN ĐẶT HÀNG
    function processCheckout() {
        const customer = document.getElementById('customer-name').value.trim();
        const court = document.getElementById('court-number').value;
        const method = document.getElementById('payment-method').value;

        if (!customer) {
            alert("Bạn vui lòng điền Tên hoặc Số điện thoại để nhân viên biết đem nước giao tận sân nha!");
            return;
        }
        if (cart.length === 0) {
            alert("Giỏ hàng đang trống, hãy chọn vài chai nước giải khát đã nhé!");
            return;
        }

        let total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        let itemsListStr = cart.map(i => `• ${i.name} (x${i.quantity})`).join('\n');
        let hinhThucTT = method === 'CASH' ? '💵 Tiền mặt tại quầy' : '💳 Đã chọn quét mã QR';

        // Soạn tin nhắn văn bản gửi về nhóm chat của nhân viên quán
        let telegramMessage = `🔔 <b>ĐƠN GỌI NƯỚC MỚI TẠI SÂN</b>\n`;
        telegramMessage += `----------------------------------\n`;
        telegramMessage += `📍 Vị trí giao: <b>${court}</b>\n`;
        telegramMessage += `👤 Tên khách: <b>${customer}</b>\n`;
        telegramMessage += `💰 Tổng bill: <b>${total.toLocaleString()}đ</b>\n`;
        telegramMessage += `💳 Thanh toán: ${hinhThucTT}\n`;
        telegramMessage += `📦 <b>Danh sách đồ gọi:</b>\n${itemsListStr}`;

        // Đồng thời lưu lịch sử đơn hàng này vào mục 'orders_history' trên Firebase để lưu trữ theo dõi
        database.ref('orders_history').push({
            customer: customer,
            court: court,
            total: total,
            payment: method,
            items: cart,
            time: new Date().toLocaleString()
        });

        // Bắn tín hiệu đến máy nhân viên tức thì
        sendNotificationToTelegram(telegramMessage);

        alert(`🎉 Đơn hàng của bạn đã gửi thành công! Nhân viên sẽ mang đồ đến ngay ${court} cho bạn.`);
        cart = [];
        document.getElementById('customer-name').value = '';
        document.getElementById('qr-container').style.display = 'none';
        renderCart();
    }
</script>
</body>
</html>
